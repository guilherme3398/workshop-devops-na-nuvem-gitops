apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: default
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/guilherme3398/workshop-devops-na-nuvem-gitops.git
    targetRevision: HEAD 
    path: k8s
  destination: 
    server: https://kubernetes.default.svc 
    namespace: default
  syncPolicy:
    automated:
      selfHeal: true 